<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRIEF 芒聙聰 Opgavestyring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy:#1a2744; --blue:#2e75b6; --blue-light:#d9e8f8; --blue-mid:#4a90d9;
  --green:#375623; --green-b:#c6efce; --red:#8b0000; --red-b:#ffcccc;
  --amber:#7f6000; --amber-b:#ffeb9c; --grey:#6b7280; --bg:#f0f3f8;
  --card:#ffffff; --border:#dde2ea; --text:#1a2744; --text-light:#6b7280;
  --sidebar:240px; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}

/* 芒聰聙芒聰聙 HEADER 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-weight:800;font-size:1.2rem;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--blue);color:#fff;padding:3px 8px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:1px}
nav{display:flex;gap:4px}
nav button{background:none;border:none;color:rgba(255,255,255,.75);padding:8px 14px;border-radius:6px;font-size:.9rem;font-weight:500;transition:.2s}
nav button:hover,nav button.active{background:rgba(255,255,255,.15);color:#fff}
.header-right{display:flex;align-items:center;gap:12px}
.user-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:20px;font-size:.85rem;display:flex;align-items:center;gap:8px;cursor:pointer;position:relative}
.user-pill select{background:none;border:none;color:#fff;font-size:.85rem;outline:none;cursor:pointer;-webkit-appearance:none;padding-right:4px}
.user-pill select option{background:var(--navy);color:#fff}
.role-badge{font-size:.7rem;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.role-executive{background:#7c3aed;color:#fff}
.role-depthead{background:var(--blue);color:#fff}
.role-teamleader{background:var(--green);color:#fff}
.role-employee{background:var(--grey);color:#fff}

/* 芒聰聙芒聰聙 LAYOUT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.app-body{display:flex;flex:1;overflow:hidden}
main{flex:1;overflow-y:auto;padding:24px}
.view{display:none}.view.active{display:block}

/* 芒聰聙芒聰聙 CARDS & STATS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.page-title{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--navy);line-height:1}
.stat-card .label{font-size:.82rem;color:var(--text-light);margin-top:4px}
.stat-card .trend{font-size:.78rem;margin-top:8px;font-weight:600}
.trend-up{color:var(--green)}.trend-dn{color:var(--red)}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.95rem;font-weight:700}
.card-body{padding:16px 18px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}

/* 芒聰聙芒聰聙 TASK ROWS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.task-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--blue-light);margin:0 -18px;padding:10px 18px;border-radius:6px}
.task-row .task-title{flex:1;font-size:.9rem;font-weight:600}
.task-row .task-meta{font-size:.78rem;color:var(--text-light)}

/* 芒聰聙芒聰聙 BADGES 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙  */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.badge-ny{background:#e0eaff;color:#1e40af}
.badge-igang{background:var(--amber-b);color:var(--amber)}
.badge-afventer{background:#ffe4d0;color:#c05621}
.badge-lost{background:var(--green-b);color:var(--green)}
.badge-hoj{background:var(--red-b);color:var(--red)}
.badge-mellem{background:var(--amber-b);color:var(--amber)}
.badge-lav{background:var(--green-b);color:var(--green)}

/* 芒聰聙芒聰聙 KANBAN 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.kanban-wrap{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;min-height:calc(100vh - 140px)}
.kanban-col{background:#e8edf5;border-radius:var(--radius);min-width:260px;flex:1;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.col-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0;font-weight:700;font-size:.9rem}
.col-ny .col-header{background:#c7d9ff;color:#1e40af}
.col-igang .col-header{background:var(--amber-b);color:var(--amber)}
.col-afventer .col-header{background:#ffd9b0;color:#c05621}
.col-lost .col-header{background:var(--green-b);color:var(--green)}
.col-count{background:rgba(0,0,0,.12);padding:1px 8px;border-radius:8px;font-size:.8rem}
.col-cards{padding:10px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:80px}
.kanban-card{background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer;transition:.2s;border-left:3px solid transparent}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.kanban-card.dragging{opacity:.5;transform:rotate(2deg)}
.kanban-card.drag-over{border-color:var(--blue);background:var(--blue-light)}
.priority-hoj{border-left-color:var(--red)}
.priority-mellem{border-left-color:#f59e0b}
.priority-lav{border-left-color:var(--green)}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:6px;line-height:1.3}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-assignee{font-size:.75rem;color:var(--text-light);display:flex;align-items:center;gap:5px}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:.65rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.card-deadline{font-size:.73rem;color:var(--text-light)}
.card-deadline.overdue{color:var(--red);font-weight:700}
.drop-zone{border:2px dashed var(--blue);border-radius:8px;padding:20px;text-align:center;color:var(--blue);font-size:.82rem;display:none}
.col-cards.dragover .drop-zone{display:block}

/* 芒聰聙芒聰聙 ANALYTICS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px}
.chart-card h3{font-size:.92rem;font-weight:700;margin-bottom:14px;color:var(--navy)}
.chart-card canvas{max-height:220px}
.chart-card-wide{grid-column:span 2}
@media(max-width:700px){.chart-card-wide{grid-column:span 1}}
.perf-table{width:100%;border-collapse:collapse;font-size:.85rem}
.perf-table th{text-align:left;padding:8px 12px;background:#f5f7fa;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy)}
.perf-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.perf-table tr:last-child td{border-bottom:none}
.bar-inline{height:8px;background:var(--blue);border-radius:4px;display:inline-block;vertical-align:middle;margin-left:8px}

/* 芒聰聙芒聰聙 MODAL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h2{font-size:1.05rem;font-weight:700}
.btn-close{background:none;border:none;font-size:1.3rem;color:var(--grey);padding:4px 8px;border-radius:6px;line-height:1}
.btn-close:hover{background:var(--bg)}
.modal-body{padding:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.83rem;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:.9rem;font-family:inherit;color:var(--text);background:#fff;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:#fff;position:sticky;bottom:0}

/* 芒聰聙芒聰聙 BUTTONS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.btn{border:none;border-radius:7px;padding:9px 18px;font-size:.88rem;font-weight:600;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1a5a8a}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#6b0000}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:1.5rem;box-shadow:0 4px 16px rgba(46,117,182,.4);z-index:100;transition:.2s}
.btn-fab:hover{background:#1a5a8a;transform:scale(1.08)}

/* 芒聰聙芒聰聙 COMMENTS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.comments-section{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.comments-section h4{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:12px}
.comment{display:flex;gap:10px;margin-bottom:12px}
.comment-bubble{background:#f5f7fa;border-radius:0 8px 8px 8px;padding:10px 12px;flex:1;font-size:.85rem;line-height:1.5}

function save() {
  localStorage.setItem('brief_users', JSON.stringify(users));
  localStorage.setItem('brief_tasks', JSON.stringify(tasks));
  localStorage.setItem('brief_user', currentUserId);
}

function currentUser() { return users.find(u=>u.id===currentUserId); }

function getVisibleTasks() {
  const u = currentUser();
  if (!u) return [];
  if (u.role === 'executive') return tasks;
  if (u.role === 'depthead') {
    const myTeamUsers = users.filter(x => x.team === u.team || x.id === u.id).map(x=>x.id);
    return tasks.filter(t => myTeamUsers.includes(t.assignee) || t.createdBy === u.id);
  }
  if (u.role === 'teamleader') {
    const myTeamUsers = users.filter(x => x.team === u.team).map(x=>x.id);
    myTeamUsers.push(u.id);
    return tasks.filter(t => myTeamUsers.includes(t.assignee) || t.createdBy === u.id);
  }
  return tasks.filter(t => t.assignee === u.id || t.createdBy === u.id);
}

function getAssignableUsers() {
  const u = currentUser();
  if (!u) return [];
  if (u.role === 'executive') return users;
  if (u.role === 'depthead') return users.filter(x => x.team === u.team || x.id === u.id || x.role==='teamleader');
  if (u.role === 'teamleader') return users.filter(x => x.team === u.team);

function dragStart(e, id) { dragId=id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function dragOver(e) { e.preventDefault(); e.currentTarget.querySelector('.col-cards')?.classList.add('dragover'); }

}

function renderAnalytics() {
  const u = currentUser();
  const visible = getVisibleTasks();
  const notes = { employee:'Kun dine egne opgaver vises.', teamleader:`Data for ${u.team}.`, depthead:`Data for ${u.team}.`, executive:'' };
  document.getElementById('access-note-analytics').innerHTML = notes[u.role] ? accessNote(notes[u.role]) : '';

  const total = visible.length;
  const done = visible.filter(t=>t.status==='L脙赂st').length;
  const active = total - done;
  const overdue = visible.filter(t=>isOverdue(t.deadline,t.status)).length;
  const rate = total ? Math.round(done/total*100) : 0;

  document.getElementById('analytics-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Totale opgaver</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="label">Completion rate</div></div>
    <div class="stat-card"><div class="num">${active}</div><div class="label">Aktive opgaver</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${overdue}</div><div class="label">Overskredet</div></div>
  `;

  // Destroy old charts
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts = {};

  // Completion by week (simulate last 4 weeks)
  const weekLabels = ['Uge -3','Uge -2','Uge -1','Uge nu'];
  const weekData = [68,74,71,rate];
  charts.completion = new Chart(document.getElementById('chart-completion'), {
    type:'line', data:{ labels:weekLabels, datasets:[{
      label:'Completion %', data:weekData, borderColor:'#2e75b6', backgroundColor:'rgba(46,117,182,.1)',
      tension:.4, fill:true, pointRadius:5, pointBackgroundColor:'#2e75b6'
    }]}, options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } }, scales:{ y:{ min:0, max:100, ticks:{ callback:v=>v+'%' } } } }
  });

  // Status distribution
  const statCounts = ['Ny','I gang','Afventer','L脙赂st'].map(s=>visible.filter(t=>t.status===s).length);
  charts.status = new Chart(document.getElementById('chart-status'), {
    type:'doughnut', data:{ labels:['Ny','I gang','Afventer','L脙赂st'],
      datasets:[{ data:statCounts, backgroundColor:['#c7d9ff','#ffd9b0',  '#ffe4d0','#c6efce'], borderWidth:2 }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ position:'bottom' } } }
  });

  // Priority
  const priCounts = ['H脙赂j','Mellem','Lav'].map(p=>visible.filter(t=>t.priority===p).length);
  charts.priority = new Chart(document.getElementById('chart-priority'), {
    type:'bar', data:{ labels:['H脙赂j','Mellem','Lav'],
      datasets:[{ data:priCounts, backgroundColor:['#ffcccc','#ffeb9c','#c6efce'], borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } }, scales:{ y:{ ticks:{ stepSize:1 } } } }
  });

  // Category
  const cats = [...new Set(visible.map(t=>t.category))];
  const catCounts = cats.map(c=>visible.filter(t=>t.category===c).length);
  charts.category = new Chart(document.getElementById('chart-category'), {
    type:'bar', data:{ labels:cats, datasets:[{ data:catCounts, backgroundColor:'#2e75b6', borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:true, indexAxis:'y', plugins:{ legend:{ display:false } } }
  });

  // Performance table
  const assignableUsers = getAssignableUsers();
  const rows = assignableUsers.map(tu=>{
    const tuTasks = visible.filter(t=>t.assignee===tu.id);
    const tuDone = tuTasks.filter(t=>t.status==='L脙赂st').length;
    const tuActive = tuTasks.filter(t=>t.status!=='L脙赂st').length;
    const tuOver = tuTasks.filter(t=>isOverdue(t.deadline,t.status)).length;
    const tuRate = tuTasks.length ? Math.round(tuDone/tuTasks.length*100) : 0;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${tu.initials}</div>${tu.name}</div></td>
      <td>${ROLES[tu.role]}</td><td>${tu.team}</td>
      <td>${tuActive}</td>
      <td><span style="color:var(--red);font-weight:${tuOver?700:400}">${tuOver}</span></td>
      <td>${tuRate}%<div class="bar-inline" style="width:${tuRate*0.8}px"></div></td>
    </tr>`;
  }).join('');
  document.getElementById('perf-table-wrap').innerHTML = `<table class="perf-table">
    <thead><tr><th>Navn</th><th>Rolle</th><th>Team</th><th>Aktive</th><th>Forsinkede</th><th>Completion</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function openModal(taskId=null) {
  editingTaskId = taskId;
  const isEdit = !!taskId;
  document.getElementById('modal-title').textContent = isEdit ? 'Rediger opgave' : 'Ny opgave';
  document.getElementById('btn-delete').style.display = isEdit ? 'inline-flex' : 'none';
  document.getElementById('comments-section').style.display = isEdit ? 'block' : 'none';

  // Populate assignee dropdown
  const assignable = getAssignableUsers();
  document.getElementById('f-assignee').innerHTML = assignable.map(u=>`<option value="${u.id}">${u.name} (${u.team})</option>`).join('');

  if (isEdit) {
    const t = tasks.find(x=>x.id===taskId);
    if (!t) return;
    document.getElementById('task-id').value = t.id;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-desc').value = t.desc||'';
    document.getElementById('f-assignee').value = t.assignee;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-priority').value = t.priority;
    document.getElementById('f-deadline').value = t.deadline||'';
    document.getElementById('f-status').value = t.status;
    renderComments(t);
  } else {
    document.getElementById('task-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-assignee').value = assignable[0]?.id||'';
    document.getElementById('f-category').value = 'Vagt';
    document.getElementById('f-priority').value = 'Mellem';
    document.getElementById('f-deadline').value = '';
    document.getElementById('f-status').value = 'Ny';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingTaskId=null; }
function handleOverlayClick(e) { if(e.target.id==='modal-overlay') closeModal(); }

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor='var(--red)'; return; }
  document.getElementById('f-title').style.borderColor='';

  const data = {
    title, desc:document.getElementById('f-desc').value,
    assignee:document.getElementById('f-assignee').value,
    category:document.getElementById('f-category').value,
    priority:document.getElementById('f-priority').value,
    deadline:document.getElementById('f-deadline').value,
    status:document.getElementById('f-status').value,
  };

  if (editingTaskId) {
    const idx = tasks.findIndex(x=>x.id===editingTaskId);
    if (idx>-1) tasks[idx] = {...tasks[idx], ...data};
  } else {
    tasks.push({ id:'t'+Date.now(), ...data, createdBy:currentUserId, createdAt:new Date().toISOString().split('T')[0], comments:[] });
  }
  save(); closeModal(); renderAll();
}

function deleteTask() {
  if (!editingTaskId) return;
  if (!confirm('Slet denne opgave?')) return;
  tasks = tasks.filter(x=>x.id!==editingTaskId);
  save(); closeModal(); renderAll();
}

function renderComments(t) {
  const list = document.getElementById('comments-list');
  list.innerHTML = t.comments.length ? t.comments.map(c=>`
    <div class="comment">
      <div class="avatar" style="flex-shrink:0">${userInitials(c.author)}</div>
      <div class="comment-bubble">${c.text}<div class="comment-meta">${userName(c.author)} 脗路 ${fmtDate(c.ts)}</div></div>
    </div>`).join('') : '<p style="font-size:.82rem;color:var(--text-light);margin-bottom:8px">Ingen kommentarer endnu.</p>';
}

function addComment() {
  if (!editingTaskId) return;
  const inp = document.getElementById('comment-input');
  const text = inp.value.trim();
  if (!text) return;
  const t = tasks.find(x=>x.id===editingTaskId);
  if (!t) return;
  t.comments.push({ author:currentUserId, text, ts:new Date().toISOString().split('T')[0] });
  save(); inp.value=''; renderComments(t);
}
