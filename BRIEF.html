<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BRIEF \u2014 Opgavestyring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy:#1a2744; --blue:#2e75b6; --blue-light:#d9e8f8; --blue-mid:#4a90d9;
  --green:#375623; --green-b:#c6efce; --red:#8b0000; --red-b:#ffcccc;
  --amber:#7f6000; --amber-b:#ffeb9c; --grey:#6b7280; --bg:#f0f3f8;
  --card:#ffffff; --border:#dde2ea; --text:#1a2744; --text-light:#6b7280;
  --sidebar:240px; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}

/* \u2500\u2500 HEADER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-weight:800;font-size:1.2rem;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--blue);color:#fff;padding:3px 8px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:1px}
nav{display:flex;gap:4px}
nav button{background:none;border:none;color:rgba(255,255,255,.75);padding:8px 14px;border-radius:6px;font-size:.9rem;font-weight:500;transition:.2s}
nav button:hover,nav button.active{background:rgba(255,255,255,.15);color:#fff}
.header-right{display:flex;align-items:center;gap:12px}
.user-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:20px;font-size:.85rem;display:flex;align-items:center;gap:8px;cursor:pointer;position:relative}
.user-pill select{background:none;border:none;color:#fff;font-size:.85rem;outline:none;cursor:pointer;-webkit-appearance:none;padding-right:4px}
.user-pill select option{background:var(--navy);color:#fff}
.role-badge{font-size:.7rem;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.role-executive{background:#7c3aed;color:#fff}
.role-depthead{background:var(--blue);color:#fff}
.role-teamleader{background:var(--green);color:#fff}
.role-employee{background:var(--grey);color:#fff}

/* \u2500\u2500 LAYOUT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.app-body{display:flex;flex:1;overflow:hidden}
main{flex:1;overflow-y:auto;padding:24px}
.view{display:none}.view.active{display:block}

/* \u2500\u2500 CARDS & STATS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.page-title{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--navy);line-height:1}
.stat-card .label{font-size:.82rem;color:var(--text-light);margin-top:4px}
.stat-card .trend{font-size:.78rem;margin-top:8px;font-weight:600}
.trend-up{color:var(--green)}.trend-dn{color:var(--red)}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.95rem;font-weight:700}
.card-body{padding:16px 18px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}

/* \u2500\u2500 TASK ROWS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.task-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--blue-light);margin:0 -18px;padding:10px 18px;border-radius:6px}
.task-row .task-title{flex:1;font-size:.9rem;font-weight:600}
.task-row .task-meta{font-size:.78rem;color:var(--text-light)}

/* \u2500\u2500 BADGES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.badge-ny{background:#e0eaff;color:#1e40af}
.badge-igang{background:var(--amber-b);color:var(--amber)}
.badge-afventer{background:#ffe4d0;color:#c05621}
.badge-lost{background:var(--green-b);color:var(--green)}
.badge-hoj{background:var(--red-b);color:var(--red)}
.badge-mellem{background:var(--amber-b);color:var(--amber)}
.badge-lav{background:var(--green-b);color:var(--green)}

/* \u2500\u2500 KANBAN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.kanban-wrap{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;min-height:calc(100vh - 140px)}
.kanban-col{background:#e8edf5;border-radius:var(--radius);min-width:260px;flex:1;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.col-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0;font-weight:700;font-size:.9rem}
.col-ny .col-header{background:#c7d9ff;color:#1e40af}
.col-igang .col-header{background:var(--amber-b);color:var(--amber)}
.col-afventer .col-header{background:#ffd9b0;color:#c05621}
.col-lost .col-header{background:var(--green-b);color:var(--green)}
.col-count{background:rgba(0,0,0,.12);padding:1px 8px;border-radius:8px;font-size:.8rem}
.col-cards{padding:10px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:80px}
.kanban-card{background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer;transition:.2s;border-left:3px solid transparent}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.kanban-card.dragging{opacity:.5;transform:rotate(2deg)}
.kanban-card.drag-over{border-color:var(--blue);background:var(--blue-light)}
.priority-hoj{border-left-color:var(--red)}
.priority-mellem{border-left-color:#f59e0b}
.priority-lav{border-left-color:var(--green)}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:6px;line-height:1.3}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-assignee{font-size:.75rem;color:var(--text-light);display:flex;align-items:center;gap:5px}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:.65rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.card-deadline{font-size:.73rem;color:var(--text-light)}
.card-deadline.overdue{color:var(--red);font-weight:700}
.drop-zone{border:2px dashed var(--blue);border-radius:8px;padding:20px;text-align:center;color:var(--blue);font-size:.82rem;display:none}
.col-cards.dragover .drop-zone{display:block}

/* \u2500\u2500 ANALYTICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px}
.chart-card h3{font-size:.92rem;font-weight:700;margin-bottom:14px;color:var(--navy)}
.chart-card canvas{max-height:220px}
.chart-card-wide{grid-column:span 2}
@media(max-width:700px){.chart-card-wide{grid-column:span 1}}
.perf-table{width:100%;border-collapse:collapse;font-size:.85rem}
.perf-table th{text-align:left;padding:8px 12px;background:#f5f7fa;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy)}
.perf-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.perf-table tr:last-child td{border-bottom:none}
.bar-inline{height:8px;background:var(--blue);border-radius:4px;display:inline-block;vertical-align:middle;margin-left:8px}

/* \u2500\u2500 MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h2{font-size:1.05rem;font-weight:700}
.btn-close{background:none;border:none;font-size:1.3rem;color:var(--grey);padding:4px 8px;border-radius:6px;line-height:1}
.btn-close:hover{background:var(--bg)}
.modal-body{padding:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.83rem;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:.9rem;font-family:inherit;color:var(--text);background:#fff;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:#fff;position:sticky;bottom:0}

/* \u2500\u2500 BUTTONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.btn{border:none;border-radius:7px;padding:9px 18px;font-size:.88rem;font-weight:600;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1a5a8a}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#6b0000}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:1.5rem;box-shadow:0 4px 16px rgba(46,117,182,.4);z-index:100;transition:.2s}
.btn-fab:hover{background:#1a5a8a;transform:scale(1.08)}

/* \u2500\u2500 COMMENTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.comments-section{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.comments-section h4{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:12px}
.comment{display:flex;gap:10px;margin-bottom:12px}
.comment-bubble{background:#f5f7fa;border-radius:0 8px 8px 8px;padding:10px 12px;flex:1;font-size:.85rem;line-height:1.5}
.comment-meta{font-size:.75rem;color:var(--text-light);margin-top:4px}
.comment-input-row{display:flex;gap:8px;margin-top:10px}
.comment-input-row input{flex:1;border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:.88rem;font-family:inherit}
.comment-input-row input:focus{outline:none;border-color:var(--blue)}

/* \u2500\u2500 EMPTY STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.empty{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
.empty p{font-size:.9rem}

/* \u2500\u2500 HAMBURGER (mobile) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.hamburger{display:none;background:none;border:none;color:#fff;font-size:1.4rem;padding:6px}
@media(max-width:600px){
  .hamburger{display:block}
  nav{display:none;position:absolute;top:58px;left:0;right:0;background:var(--navy);flex-direction:column;padding:8px;gap:2px;z-index:300}
  nav.open{display:flex}
  nav button{text-align:left}
  .logo-badge{display:none}
}

/* \u2500\u2500 SCROLLBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1cbd8;border-radius:3px}

/* \u2500\u2500 TOOLTIP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.access-note{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:8px 14px;font-size:.82rem;color:var(--amber);margin-bottom:16px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">BRIEF</span>
    Opgavestyring
  </div>
  <button class="hamburger" onclick="toggleNav()">\u2630</button>
  <nav id="main-nav">
    <button onclick="switchView('dashboard')" class="active" id="nav-dashboard">\u{1F4CB} Oversigt</button>
    <button onclick="switchView('kanban')" id="nav-kanban">\u{1F4CC} Kanban</button>
    <button onclick="switchView('analytics')" id="nav-analytics">\u{1F4CA} Analytics</button>
  </nav>
  <div class="header-right">
    <div class="user-pill">
      <select id="user-select" onchange="switchUser(this.value)"></select>
      <span id="role-badge" class="role-badge"></span>
    </div>
  </div>
</header>

<div class="app-body">
<main id="main-content">

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="page-title">\u{1F4CB} Oversigt <span id="dash-subtitle" style="font-size:.9rem;font-weight:400;color:var(--text-light)"></span></div>
    <div class="stats-grid" id="stats-grid"></div>
    <div id="access-note-dash"></div>
    <div class="two-col">
      <div class="card">
        <div class="card-header"><h3>Mine opgaver</h3><button class="btn btn-sm btn-primary" onclick="openModal()">+ Ny</button></div>
        <div class="card-body" id="my-tasks-list"></div>
      </div>
      <div class="card" id="team-panel">
        <div class="card-header"><h3>Team-overblik</h3></div>
        <div class="card-body" id="team-overview"></div>
      </div>
    </div>
    <div class="card" id="all-tasks-card">
      <div class="card-header"><h3 id="all-tasks-title">Alle aktive opgaver</h3></div>
      <div class="card-body" id="all-tasks-list"></div>
    </div>
  </div>

  <!-- KANBAN -->
  <div class="view" id="view-kanban">
    <div class="page-title" style="justify-content:space-between">

<!-- TASK MODAL -->

    </div>

      <input type="hidden" id="task-id">

      </div>

        <div class="form-group">
          <label>Kategori</label>
          <select id="f-category">
            <option value="Vagt">Vagt</option>
            <option value="Uddannelse">Uddannelse</option>
            <option value="Administration">Administration</option>
            <option value="Planlægning">Planlægning</option>
            <option value="Logistik">Logistik</option>
            <option value="Andet">Andet</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Prioritet</label>
          <select id="f-priority">
            <option value="Høj">Høj</option>
            <option value="Mellem" selected>Mellem</option>
            <option value="Lav">Lav</option>
          </select>
        </div>
        <div class="form-group">
          <label>Deadline</label>
          <input type="date" id="f-deadline">
        </div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Ny">Ny</option>
          <option value="I gang">I gang</option>

          <button class="btn btn-primary btn-sm" onclick="addComment()">Send</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="btn-delete" onclick="deleteTask()" style="display:none;margin-right:auto">Slet</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuller</button>
      <button class="btn btn-primary" onclick="saveTask()">Gem opgave</button>
    </div>
  </div>
</div>

<script>
// \u2500\u2500\u2500 DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const ROLES = { executive:'Executive', depthead:'Dept. Head', teamleader:'Team Leader', employee:'Employee' };

const DEFAULT_USERS = [
  { id:'u1', name:'Andreas J.O.',  role:'executive',   team:'HQ',       initials:'AJ' },
  { id:'u2', name:'Mette S.',      role:'depthead',    team:'Sektion 1', initials:'MS' },
  { id:'u3', name:'Jakob N.',      role:'depthead',    team:'Sektion 2', initials:'JN' },
  { id:'u4', name:'Lars P.',       role:'teamleader',  team:'Gruppe 1',  initials:'LP' },
  { id:'u5', name:'Rasmus T.',     role:'teamleader',  team:'Gruppe 2',  initials:'RT' },
  { id:'u6', name:'Søren A.',      role:'employee',    team:'Gruppe 1',  initials:'SA' },
  { id:'u7', name:'Nikolaj B.',    role:'employee',    team:'Gruppe 1',  initials:'NB' },
  { id:'u8', name:'Frederik M.',   role:'employee',    team:'Gruppe 2',  initials:'FM' },
];

const today = new Date();
const d = (offset) => { const x=new Date(today); x.setDate(x.getDate()+offset); return x.toISOString().split('T')[0]; };

const DEFAULT_TASKS = [
  { id:'t1', title:'Vagtplan uge 14 færdiggøres', desc:'Udkast til vagtplan for uge 14 skal godkendes og sendes ud senest fredag.', assignee:'u4', category:'Vagt', priority:'Høj', deadline:d(2), status:'I gang', createdBy:'u1', createdAt:d(-3), comments:[{author:'u1',text:'Husk at tage hensyn til fridagene i påsken.',ts:d(-2)}] },
  { id:'t2', title:'Indmeldelse til skydning inkl. støttehold', desc:'Koordiner med Sektion 2 og send samlet indmeldelse.', assignee:'u5', category:'Uddannelse', priority:'Høj', deadline:d(1), status:'Afventer', createdBy:'u2', createdAt:d(-5), comments:[] },
  { id:'t3', title:'Materielrapport Q1 afleveres', desc:'Gennemgang og aflevering af kvartalsmæssig materielrapport.', assignee:'u2', category:'Administration', priority:'Mellem', deadline:d(5), status:'Ny', createdBy:'u1', createdAt:d(-1), comments:[] },
  { id:'t4', title:'Briefing om OP CUSTODIA ændringer', desc:'Orientér alle holdledere om ændringer i OP CUSTODIA procedure.', assignee:'u3', category:'Planlægning', priority:'Høj', deadline:d(0), status:'I gang', createdBy:'u1', createdAt:d(-2), comments:[{author:'u3',text:'Møde planlagt til kl. 14:00 i dag.',ts:d(0)}] },
  { id:'t5', title:'Soldatudrustning kontrol Gruppe 1', desc:'Fuldt udrustningstjek for alle soldater i Gruppe 1.', assignee:'u4', category:'Logistik', priority:'Mellem', deadline:d(7), status:'Ny', createdBy:'u2', createdAt:d(-1), comments:[] },
  { id:'t6', title:'Opdater beredskabsplan', desc:'Revidering af lokal beredskabsplan iht. ny instruks.', assignee:'u2', category:'Administration', priority:'Lav', deadline:d(14), status:'Ny', createdBy:'u1', createdAt:d(-7), comments:[] },
  { id:'t7', title:'Øvelsesplanlægning juni', desc:'Fremlæg forslag til øvelsesaktiviteter i juni for godkendelse.', assignee:'u3', category:'Uddannelse', priority:'Mellem', deadline:d(21), status:'Ny', createdBy:'u1', createdAt:d(-4), comments:[] },
  { id:'t8', title:'Amalienborg koordinering påske', desc:'Koordiner med vagtkompagniet ift. påskearrangement.', assignee:'u1', category:'Vagt', priority:'Høj', deadline:d(3), status:'I gang', createdBy:'u1', createdAt:d(-6), comments:[] },
  { id:'t9', title:'Indberetning sygefravær marts', desc:'Månedlig indberetning af sygefravær til S1.', assignee:'u5', category:'Administration', priority:'Lav', deadline:d(-1), status:'Løst', createdBy:'u2', createdAt:d(-10), comments:[{author:'u5',text:'Afsendt til S1.',ts:d(-1)}] },
  { id:'t10', title:'Vedligehold af håndvåben \u2014 uge 13', desc:'Planmæssig vedligehold og eftersyn af kompagniets håndvåben.', assignee:'u6', category:'Logistik', priority:'Mellem', deadline:d(-3), status:'Løst', createdBy:'u4', createdAt:d(-8), comments:[] },
  { id:'t11', title:'Soldatsamtaler kvartal 1', desc:'Gennemfør kvartalsvise soldatsamtaler for alle i Gruppe 1.', assignee:'u4', category:'Uddannelse', priority:'Lav', deadline:d(10), status:'I gang', createdBy:'u2', createdAt:d(-3), comments:[] },
  { id:'t12', title:'Kompagnidagsbefehl uge 14', desc:'Udkast til kompagnidagsbefehl sendes til godkendelse.', assignee:'u7', category:'Administration', priority:'Mellem', deadline:d(1), status:'I gang', createdBy:'u4', createdAt:d(-1), comments:[] },
];

// \u2500\u2500\u2500 STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let users = JSON.parse(localStorage.getItem('brief_users') || 'null') || DEFAULT_USERS;
let tasks = JSON.parse(localStorage.getItem('brief_tasks') || 'null') || DEFAULT_TASKS;
let currentUserId = localStorage.getItem('brief_user') || 'u1';
let currentView = 'dashboard';
let editingTaskId = null;
let charts = {};

function save() {
  localStorage.setItem('brief_users', JSON.stringify(users));
  localStorage.setItem('brief_tasks', JSON.stringify(tasks));
  localStorage.setItem('brief_user', currentUserId);
}

function currentUser() { return users.find(u=>u.id===currentUserId); }

function getVisibleTasks() {
  const u = currentUser();
  if (!u) return [];
  if (u.role === 'executive') return tasks;
  if (u.role === 'depthead') {
    const myTeamUsers = users.filter(x => x.team === u.team || x.id === u.id).map(x=>x.id);
    return tasks.filter(t => myTeamUsers.includes(t.assignee) || t.createdBy === u.id);
  }
  if (u.role === 'teamleader') {
    const myTeamUsers = users.filter(x => x.team === u.team).map(x=>x.id);
    myTeamUsers.push(u.id);
    return tasks.filter(t => myTeamUsers.includes(t.assignee) || t.createdBy === u.id);
  }
  return tasks.filter(t => t.assignee === u.id || t.createdBy === u.id);
}

function getAssignableUsers() {
  const u = currentUser();
  if (!u) return [];
  if (u.role === 'executive') return users;
  if (u.role === 'depthead') return users.filter(x => x.team === u.team || x.id === u.id || x.role==='teamleader');
  if (u.role === 'teamleader') return users.filter(x => x.team === u.team);
  return [u];
}

function userName(id) { const u = users.find(x=>x.id===id); return u ? u.name : '\u2014'; }
function userInitials(id) { const u = users.find(x=>x.id===id); return u ? u.initials : '?'; }

// \u2500\u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function init() {
  // Populate user selector
  const sel = document.getElementById('user-select');
  sel.innerHTML = users.map(u=>`<option value="${u.id}">${u.name} (${ROLES[u.role]})</option>`).join('');
  sel.value = currentUserId;
  updateRoleBadge();
  renderAll();
}

function switchUser(id) {
  currentUserId = id;
  save();
  updateRoleBadge();
  renderAll();
}

function updateRoleBadge() {
  const u = currentUser();
  const b = document.getElementById('role-badge');
  b.textContent = ROLES[u.role];
  b.className = `role-badge role-${u.role}`;
}

function toggleNav() {
  document.getElementById('main-nav').classList.toggle('open');
}

function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('main-nav').classList.remove('open');
  if (v==='analytics') renderAnalytics();
  else if (v==='kanban') renderKanban();
  else renderDashboard();
}

function renderAll() {
  if (currentView==='dashboard') renderDashboard();
  else if (currentView==='kanban') renderKanban();
  else renderAnalytics();
}

// \u2500\u2500\u2500 STATUS HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function statusClass(s) {
  return ({Ny:'ny','I gang':'igang',Afventer:'afventer',Løst:'lost'}[s]||'ny');
}
function priorityClass(p) {
  return ({Høj:'hoj',Mellem:'mellem',Lav:'lav'}[p]||'lav');
}
function isOverdue(deadline, status) {
  if (!deadline || status==='Løst') return false;
  return new Date(deadline) < new Date(today.toISOString().split('T')[0]);
}
function fmtDate(d) {
  if (!d) return '';
  const x = new Date(d+'T00:00:00');
  return x.toLocaleDateString('da-DK',{day:'numeric',month:'short'});
}
function accessNote(text) { return `<div class="access-note">\u{1F512} ${text}</div>`; }

// \u2500\u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderDashboard() {
  const u = currentUser();
  const visible = getVisibleTasks();
  document.getElementById('dash-subtitle').textContent = `\u2014 ${u.name}`;

  // Stats
  const active = visible.filter(t=>t.status!=='Løst');
  const done = visible.filter(t=>t.status==='Løst');
  const overdue = active.filter(t=>isOverdue(t.deadline,t.status));
  const high = active.filter(t=>t.priority==='Høj');
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="num">${active.length}</div><div class="label">Aktive opgaver</div></div>
    <div class="stat-card"><div class="num">${done.length}</div><div class="label">Afsluttet</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${overdue.length}</div><div class="label">Overskredet deadline</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${high.length}</div><div class="label">Høj prioritet</div></div>
  `;

  // Access note
  const notes = { employee:'Du ser kun dine egne opgaver.', teamleader:`Du ser opgaver for ${u.team}.`, depthead:`Du ser opgaver for ${u.team}.`, executive:'' };
  document.getElementById('access-note-dash').innerHTML = notes[u.role] ? accessNote(notes[u.role]) : '';

  // My tasks
  const mine = tasks.filter(t=>t.assignee===u.id&&t.status!=='Løst');
  const myEl = document.getElementById('my-tasks-list');
  myEl.innerHTML = mine.length ? mine.map(t=>taskRowHTML(t)).join('') : '<div class="empty"><div class="empty-icon">\u2705</div><p>Ingen aktive opgaver til dig</p></div>';

  // Team overview
  const teamEl = document.getElementById('team-overview');
  const teamPanel = document.getElementById('team-panel');
  if (u.role==='employee') { teamPanel.style.display='none'; }
  else {
    teamPanel.style.display='';
    const teamUsers = u.role==='executive' ? users : users.filter(x=>x.team===u.team);
    teamEl.innerHTML = teamUsers.map(tu=>{
      const tu_tasks = tasks.filter(t=>t.assignee===tu.id&&t.status!=='Løst');
      const tu_over = tu_tasks.filter(t=>isOverdue(t.deadline,t.status)).length;
      return `<div class="task-row" style="cursor:default">
        <div class="avatar">${tu.initials}</div>
        <div class="task-title" style="font-weight:500">${tu.name}<br><span style="font-size:.75rem;color:var(--text-light)">${tu.team} · ${ROLES[tu.role]}</span></div>
        <span class="badge badge-${statusClass('I gang')}">${tu_tasks.length} aktive</span>
        ${tu_over?`<span class="badge badge-hoj">${tu_over} forsinket</span>`:''}
      </div>`;
    }).join('') || '<div class="empty"><p>Ingen teammedlemmer</p></div>';
  }

  // All tasks
  document.getElementById('all-tasks-title').textContent = u.role==='employee'?'Mine løste opgaver':'Alle aktive opgaver';
  const allActive = u.role==='employee' ? tasks.filter(t=>t.assignee===u.id&&t.status==='Løst').slice(0,8) : visible.filter(t=>t.status!=='Løst');
  document.getElementById('all-tasks-list').innerHTML = allActive.length ? allActive.map(t=>taskRowHTML(t)).join('') : '<div class="empty"><div class="empty-icon">\u{1F4ED}</div><p>Ingen opgaver at vise</p></div>';
}

function taskRowHTML(t) {
  const od = isOverdue(t.deadline,t.status);
  return `<div class="task-row" onclick="openModal('${t.id}')">
    <span class="badge badge-${priorityClass(t.priority)}">${t.priority}</span>
    <div><div class="task-title">${t.title}</div><div class="task-meta">${t.category} · ${userName(t.assignee)}</div></div>
    <span class="badge badge-${statusClass(t.status)}">${t.status}</span>
    <span class="task-meta" style="${od?'color:var(--red);font-weight:700':''}">${fmtDate(t.deadline)}</span>
  </div>`;
}

// \u2500\u2500\u2500 KANBAN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderKanban() {
  const u = currentUser();
  const visible = getVisibleTasks();
  const notes = { employee:'Du ser kun dine egne opgaver.', teamleader:`Du ser opgaver for ${u.team}.`, depthead:`Du ser opgaver for ${u.team}.`, executive:'' };
  document.getElementById('access-note-kanban').innerHTML = notes[u.role] ? accessNote(notes[u.role]) : '';

  const cols = [
    { key:'Ny', label:'Ny', cls:'col-ny' },
    { key:'I gang', label:'I gang', cls:'col-igang' },
    { key:'Afventer', label:'Afventer', cls:'col-afventer' },
    { key:'Løst', label:'Løst', cls:'col-lost' },
  ];
  const board = document.getElementById('kanban-board');
  board.innerHTML = cols.map(col=>{
    const colTasks = visible.filter(t=>t.status===col.key);
    return `<div class="kanban-col ${col.cls}" id="col-${col.key.replace(' ','_')}"
      ondragover="dragOver(event)" ondrop="drop(event,'${col.key}')" ondragleave="dragLeave(event)">
      <div class="col-header">${col.label}<span class="col-count">${colTasks.length}</span></div>
      <div class="col-cards" id="cards-${col.key.replace(' ','_')}">
        ${colTasks.length ? colTasks.map(t=>kanbanCardHTML(t)).join('') : '<div class="empty" style="padding:20px 10px"><p>Ingen her</p></div>'}
      </div>
    </div>`;
  }).join('');
}

function kanbanCardHTML(t) {
  const od = isOverdue(t.deadline,t.status);
  return `<div class="kanban-card priority-${priorityClass(t.priority)}" draggable="true"
    id="kcard-${t.id}" ondragstart="dragStart(event,'${t.id}')" onclick="openModal('${t.id}')">
    <div class="card-title">${t.title}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
      <span class="badge badge-${priorityClass(t.priority)}">${t.priority}</span>
      <span class="badge" style="background:#e8edf5;color:var(--navy)">${t.category}</span>
    </div>
    <div class="card-footer">
      <div class="card-assignee"><div class="avatar">${userInitials(t.assignee)}</div>${userName(t.assignee)}</div>
      <div class="card-deadline ${od?'overdue':''}">${od?'\u26A0 ':''}${fmtDate(t.deadline)}</div>
    </div>
  </div>`;
}

// \u2500\u2500\u2500 DRAG & DROP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let dragId = null;
function dragStart(e, id) { dragId=id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function dragOver(e) { e.preventDefault(); e.currentTarget.querySelector('.col-cards')?.classList.add('dragover'); }
function dragLeave(e) { e.currentTarget.querySelector('.col-cards')?.classList.remove('dragover'); }
function drop(e, status) {
  e.preventDefault();
  e.currentTarget.querySelector('.col-cards')?.classList.remove('dragover');
  if (!dragId) return;
  const t = tasks.find(x=>x.id===dragId);
  if (t) { t.status=status; save(); renderKanban(); }
  dragId=null;
}

// \u2500\u2500\u2500 ANALYTICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderAnalytics() {
  const u = currentUser();
  const visible = getVisibleTasks();
  const notes = { employee:'Kun dine egne opgaver vises.', teamleader:`Data for ${u.team}.`, depthead:`Data for ${u.team}.`, executive:'' };
  document.getElementById('access-note-analytics').innerHTML = notes[u.role] ? accessNote(notes[u.role]) : '';

  const total = visible.length;
  const done = visible.filter(t=>t.status==='Løst').length;
  const active = total - done;
  const overdue = visible.filter(t=>isOverdue(t.deadline,t.status)).length;
  const rate = total ? Math.round(done/total*100) : 0;

  document.getElementById('analytics-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Totale opgaver</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="label">Completion rate</div></div>
    <div class="stat-card"><div class="num">${active}</div><div class="label">Aktive opgaver</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${overdue}</div><div class="label">Overskredet</div></div>
  `;

  // Destroy old charts
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts = {};

  // Completion by week (simulate last 4 weeks)
  const weekLabels = ['Uge -3','Uge -2','Uge -1','Uge nu'];
  const weekData = [68,74,71,rate];
  charts.completion = new Chart(document.getElementById('chart-completion'), {
    type:'line', data:{ labels:weekLabels, datasets:[{
      label:'Completion %', data:weekData, borderColor:'#2e75b6', backgroundColor:'rgba(46,117,182,.1)',
      tension:.4, fill:true, pointRadius:5, pointBackgroundColor:'#2e75b6'
    }]}, options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } }, scales:{ y:{ min:0, max:100, ticks:{ callback:v=>v+'%' } } } }
  });

  // Status distribution
  const statCounts = ['Ny','I gang','Afventer','Løst'].map(s=>visible.filter(t=>t.status===s).length);
  charts.status = new Chart(document.getElementById('chart-status'), {
    type:'doughnut', data:{ labels:['Ny','I gang','Afventer','Løst'],
      datasets:[{ data:statCounts, backgroundColor:['#c7d9ff','#ffd9b0',  '#ffe4d0','#c6efce'], borderWidth:2 }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ position:'bottom' } } }
  });

  // Priority
  const priCounts = ['Høj','Mellem','Lav'].map(p=>visible.filter(t=>t.priority===p).length);
  charts.priority = new Chart(document.getElementById('chart-priority'), {
    type:'bar', data:{ labels:['Høj','Mellem','Lav'],
      datasets:[{ data:priCounts, backgroundColor:['#ffcccc','#ffeb9c','#c6efce'], borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } }, scales:{ y:{ ticks:{ stepSize:1 } } } }
  });

  // Category
  const cats = [...new Set(visible.map(t=>t.category))];
  const catCounts = cats.map(c=>visible.filter(t=>t.category===c).length);
  charts.category = new Chart(document.getElementById('chart-category'), {
    type:'bar', data:{ labels:cats, datasets:[{ data:catCounts, backgroundColor:'#2e75b6', borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:true, indexAxis:'y', plugins:{ legend:{ display:false } } }
  });

  // Performance table
  const assignableUsers = getAssignableUsers();
  const rows = assignableUsers.map(tu=>{
    const tuTasks = visible.filter(t=>t.assignee===tu.id);
    const tuDone = tuTasks.filter(t=>t.status==='Løst').length;
    const tuActive = tuTasks.filter(t=>t.status!=='Løst').length;
    const tuOver = tuTasks.filter(t=>isOverdue(t.deadline,t.status)).length;
    const tuRate = tuTasks.length ? Math.round(tuDone/tuTasks.length*100) : 0;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${tu.initials}</div>${tu.name}</div></td>
      <td>${ROLES[tu.role]}</td><td>${tu.team}</td>
      <td>${tuActive}</td>
      <td><span style="color:var(--red);font-weight:${tuOver?700:400}">${tuOver}</span></td>
      <td>${tuRate}%<div class="bar-inline" style="width:${tuRate*0.8}px"></div></td>
    </tr>`;
  }).join('');
  document.getElementById('perf-table-wrap').innerHTML = `<table class="perf-table">
    <thead><tr><th>Navn</th><th>Rolle</th><th>Team</th><th>Aktive</th><th>Forsinkede</th><th>Completion</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

// \u2500\u2500\u2500 MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function openModal(taskId=null) {
  editingTaskId = taskId;
  const isEdit = !!taskId;
  document.getElementById('modal-title').textContent = isEdit ? 'Rediger opgave' : 'Ny opgave';
  document.getElementById('btn-delete').style.display = isEdit ? 'inline-flex' : 'none';
  document.getElementById('comments-section').style.display = isEdit ? 'block' : 'none';

  // Populate assignee dropdown
  const assignable = getAssignableUsers();
  document.getElementById('f-assignee').innerHTML = assignable.map(u=>`<option value="${u.id}">${u.name} (${u.team})</option>`).join('');

  if (isEdit) {
    const t = tasks.find(x=>x.id===taskId);
    if (!t) return;
    document.getElementById('task-id').value = t.id;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-desc').value = t.desc||'';
    document.getElementById('f-assignee').value = t.assignee;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-priority').value = t.priority;
    document.getElementById('f-deadline').value = t.deadline||'';
    document.getElementById('f-status').value = t.status;
    renderComments(t);
  } else {
    document.getElementById('task-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-assignee').value = assignable[0]?.id||'';
    document.getElementById('f-category').value = 'Vagt';
    document.getElementById('f-priority').value = 'Mellem';
    document.getElementById('f-deadline').value = '';
    document.getElementById('f-status').value = 'Ny';
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingTaskId=null; }
function handleOverlayClick(e) { if(e.target.id==='modal-overlay') closeModal(); }

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor='var(--red)'; return; }
  document.getElementById('f-title').style.borderColor='';

  const data = {
    title, desc:document.getElementById('f-desc').value,
    assignee:document.getElementById('f-assignee').value,
    category:document.getElementById('f-category').value,
    priority:document.getElementById('f-priority').value,
    deadline:document.getElementById('f-deadline').value,
    status:document.getElementById('f-status').value,
  };

  if (editingTaskId) {
    const idx = tasks.findIndex(x=>x.id===editingTaskId);
    if (idx>-1) tasks[idx] = {...tasks[idx], ...data};
  } else {
    tasks.push({ id:'t'+Date.now(), ...data, createdBy:currentUserId, createdAt:new Date().toISOString().split('T')[0], comments:[] });
  }
  save(); closeModal(); renderAll();
}

function deleteTask() {
  if (!editingTaskId) return;
  if (!confirm('Slet denne opgave?')) return;
  tasks = tasks.filter(x=>x.id!==editingTaskId);
  save(); closeModal(); renderAll();
}

function renderComments(t) {
  const list = document.getElementById('comments-list');
  list.innerHTML = t.comments.length ? t.comments.map(c=>`
    <div class="comment">
      <div class="avatar" style="flex-shrink:0">${userInitials(c.author)}</div>
      <div class="comment-bubble">${c.text}<div class="comment-meta">${userName(c.author)} · ${fmtDate(c.ts)}</div></div>
    </div>`).join('') : '<p style="font-size:.82rem;color:var(--text-light);margin-bottom:8px">Ingen kommentarer endnu.</p>';
}

function addComment() {
  if (!editingTaskId) return;
  const inp = document.getElementById('comment-input');
  const text = inp.value.trim();
  if (!text) return;
  const t = tasks.find(x=>x.id===editingTaskId);
  if (!t) return;
  t.comments.push({ author:currentUserId, text, ts:new Date().toISOString().split('T')[0] });
  save(); inp.value=''; renderComments(t);
}

init();
